<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝗘𝗦 𝗧𝗘𝗔𝗠𝗦 𝗖𝗥𝗬𝗣𝗧𝗢 𝗖𝗘𝗡𝗧𝗘𝗥</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0b1120;color:white;transition:0.4s;display:flex;flex-direction:row;min-height:100vh;}
.sidebar{width:300px;padding:20px;background:#020617;box-shadow:2px 0 15px rgba(0,0,0,0.5);}
.sidebar h2{color:#38bdf8;margin-top:15px;font-size:18px;}
.news{background:rgba(30,41,59,0.85);padding:10px;border-radius:8px;margin-top:15px;max-height:300px;overflow-y:auto;}
.power-btn-container{margin-top:20px;display:flex;justify-content:center;}
.power-btn{width:50px;height:50px;border-radius:50%;background:#ef4444;border:none;cursor:pointer;box-shadow:0 0 15px #ef4444;animation:blink 1s infinite;}
@keyframes blink{0%,50%,100%{opacity:1;}25%,75%{opacity:0.3;}}
.container{flex:1;padding:20px;}
header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#020617;box-shadow:0 0 25px rgba(0,0,0,0.8);}
h1{font-size:22px;color:#38bdf8;}
.controls{position:relative;display:flex;gap:10px;align-items:center;}
.search{padding:8px;border-radius:8px;border:none;background:#1e293b;color:white;width:200px;outline:none;transition:0.3s;}
.search:focus{background:#334155;}
.dropdown{position:absolute;top:37px;left:0;width:200px;background:#1e293b;border-radius:8px;overflow:hidden;max-height:200px;overflow-y:auto;display:none;z-index:99;}
.dropdown div{padding:8px;cursor:pointer;transition:0.2s;}
.dropdown div:hover{background:#334155;}
.toggle-container{width:50px;height:28px;border-radius:50px;background:#2563eb;display:flex;align-items:center;cursor:pointer;padding:3px;transition:all .5s;}
.toggle-container.sun{justify-content:flex-end;}
.toggle-ball{width:22px;height:22px;border-radius:50%;background:yellow;transition:all .5s;}
.ticker{background:#020617;padding:8px;overflow:hidden;white-space:nowrap;border-bottom:1px solid #1e293b;}
.ticker span{padding-right:50px;display:inline-block;animation:scroll 20s linear infinite;}
@keyframes scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;margin-bottom:20px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:15px;margin-bottom:20px;}
.stat,.card{background:rgba(30,41,59,0.85);backdrop-filter:blur(10px);padding:15px;border-radius:12px;border:1px solid #334155;transition:0.3s;box-shadow:0px 4px 10px rgba(0,0,0,0.5);}
.stat:hover,.card:hover{transform:translateY(-5px) scale(1.02);box-shadow:0px 6px 20px rgba(0,0,0,0.7);}
.price{font-size:22px;margin-top:5px;}
.green{color:#22c55e;}
.red{color:#ef4444;}
table{width:100%;border-collapse:collapse;background:rgba(30,41,59,0.85);border-radius:8px;overflow:hidden;transition:0.3s;}
th,td{padding:10px;border-bottom:1px solid #334155;text-align:left;}
tr:hover{background:#334155;cursor:pointer;}
.chartbox{margin-top:25px;background:rgba(30,41,59,0.85);backdrop-filter:blur(10px);padding:20px;border-radius:12px;transition:0.3s;}
.news-container{display:flex;flex-wrap:wrap;gap:10px;margin-top:25px;}
.news-item{background:rgba(30,41,59,0.85);border-radius:8px;overflow:hidden;width:100%;display:flex;align-items:center;gap:10px;padding:10px;transition:0.3s;}
.news-item img{width:80px;height:50px;object-fit:cover;border-radius:6px;}
.news-item a{color:white;text-decoration:none;flex:1;}
.news-item:hover{background:#334155;}
.light{background:#f1f5f9;color:black;}
.light header{background:white;}
.light table,.light .card,.light .chartbox,.light .stat,.light .news-item{background:white;color:black;}
.light .search{background:#e5e5e5;color:black;}
.light .toggle-ball{background:#333;}
.light .ticker{background:#f1f5f9;color:black;}
.light .card:hover{box-shadow:0px 6px 20px rgba(0,0,0,0.3);}
.light th,.light td{border-bottom:1px solid #ccc;}
@media(max-width:900px){body{flex-direction:column;}.sidebar{width:100%;}}
</style>
</head>
<body>
<div class="sidebar">
  <div class="ticker" id="ticker"></div>
  <h2>Market Events</h2>
  <div class="news" id="news"></div>
  <div class="power-btn-container">
    <button class="power-btn" id="powerBtn"></button>
  </div>
</div>
<div class="container">
  <header>
    <h1 id="headerTitle">𝗘𝗦 𝗧𝗘𝗔𝗠𝗦 𝗖𝗥𝗬𝗣𝗧𝗢 𝗖𝗘𝗡𝗧𝗘𝗥</h1>
    <div class="controls">
      <input id="search" class="search" placeholder="Search coin">
      <div class="dropdown" id="dropdown"></div>
      <div class="toggle-container" id="modeToggle"><div class="toggle-ball"></div></div>
    </div>
  </header>
  <div class="stats" id="stats"></div>
  <div class="cards" id="cards"></div>
  <h3>Market Table</h3>
  <table>
    <thead><tr><th>Coin</th><th>Price</th><th>24h</th><th>Market Cap</th></tr></thead>
    <tbody id="table"></tbody>
  </table>
  <div class="chartbox">
    <h3 id="chartTitle">Market Chart</h3>
    <canvas id="chart"></canvas>
  </div>
  <div class="news-container" id="newsContainer"></div>
</div>
<script>
const pairs = [
  "btcusdt","ethusdt","solusdt","trxusdt","tonusdt","dogeusdt","xrpusdt","ltcusdt","xauusdt",
  "adausdt","dotusdt","bnbusdt","shibusdt","maticusdt","avaxusdt","linkusdt","atomusdt","etcusdt","filusdt"
]; // up to 100, add more as needed
let chart, currentCoin="btcusdt", ws;
let isDark=true;
const coinData={};

// Dark/light toggle
const modeToggle=document.getElementById('modeToggle');
modeToggle.addEventListener('click',()=>{document.body.classList.toggle('light');isDark=!isDark;modeToggle.classList.toggle('sun');localStorage.setItem('darkMode',isDark);});
if(localStorage.getItem('darkMode')==='false'){document.body.classList.add('light');isDark=false;modeToggle.classList.add('sun');}

// Power button closes window
document.getElementById('powerBtn').addEventListener('click',()=>{window.close();});

// WebSocket connection
function connectWS(){
  if(ws) ws.close();
  const streams=pairs.map(p=>p+'@ticker').join('/');
  ws=new WebSocket('wss://stream.binance.com:9443/stream?streams='+streams);
  ws.onmessage=event=>{
    const msg=JSON.parse(event.data);
    const d=msg.data;
    coinData[d.s]=d;
    renderAll();
    if(currentCoin===d.s.toLowerCase()) updateChart(d);
  };
}

// Render cards, table, ticker
function renderAll(){
  const cardsDiv=document.getElementById('cards');
  const tableBody=document.getElementById('table');
  const tickerDiv=document.getElementById('ticker');
  cardsDiv.innerHTML=''; tableBody.innerHTML=''; tickerDiv.innerHTML='';
  pairs.forEach(p=>{
    const c=coinData[p.toUpperCase()]; if(!c) return;
    const change=parseFloat(c.P); const color=change>=0?'green':'red';
    // Cards
    cardsDiv.innerHTML+=`<div class='card' onclick="setCurrentCoin('${c.s.toLowerCase()}')"><b>${c.s.replace('USDT','')}</b><div class='price'>$${parseFloat(c.c).toLocaleString()}</div><div class='${color}'>${parseFloat(c.P).toFixed(2)}%</div></div>`;
    // Table
    tableBody.innerHTML+=`<tr onclick="setCurrentCoin('${c.s.toLowerCase()}')"><td>${c.s.replace('USDT','')}</td><td>$${parseFloat(c.c).toLocaleString()}</td><td class='${color}'>${parseFloat(c.P).toFixed(2)}%</td><td>$${(parseFloat(c.qv)/1e6).toFixed(2)}M</td></tr>`;
    // Ticker
    tickerDiv.innerHTML+=`<span>${c.s.replace('USDT','')} $${parseFloat(c.c).toLocaleString()}</span>`;
  });
}

// Set current coin
function setCurrentCoin(coin){
  currentCoin=coin;
  document.getElementById('headerTitle').innerText=coin.replace('usdt','').toUpperCase();
  if(coinData[coin.toUpperCase()]) updateChart(coinData[coin.toUpperCase()]);
}

// Chart
function updateChart(d){
  const price=parseFloat(d.c);
  const time=new Date().toLocaleTimeString();
  if(!chart){
    const ctx=document.getElementById('chart');
    chart=new Chart(ctx,{
      type:'line',
      data:{labels:[time],datasets:[{label:d.s,data:[price],borderColor:'#38bdf8',backgroundColor:'rgba(56,189,248,0.2)',tension:0.3}]},
      options:{plugins:{legend:{display:true}},scales:{y:{ticks:{color:isDark?'white':'black'}},x:{ticks:{color:isDark?'white':'black'}}}}
    });
  }else{
    chart.data.labels.push(time);
    chart.data.datasets[0].data.push(price);
    if(chart.data.labels.length>50){chart.data.labels.shift(); chart.data.datasets[0].data.shift();}
    chart.data.datasets[0].label=d.s;
    chart.update();
  }
}

// Search
const searchInput=document.getElementById('search');
const dropdown=document.getElementById('dropdown');
searchInput.addEventListener('input',()=>{
  const val=searchInput.value.toLowerCase();
  dropdown.innerHTML='';
  if(!val){dropdown.style.display='none';return;}
  pairs.forEach(p=>{
    if(p.includes(val)){
      const div=document.createElement('div');
      div.innerText=p.replace('usdt','').toUpperCase();
      div.onclick=()=>{setCurrentCoin(p); dropdown.style.display='none'; searchInput.value='';};
      dropdown.appendChild(div);
    }
  });
  dropdown.style.display=dropdown.children.length?'block':'none';
});

// News from CoinStats
async function loadNews(){
  try{
    const res=await fetch('https://api.coinstats.app/public/v1/news?skip=0&limit=10');
    const data=await res.json();
    const newsContainer=document.getElementById('newsContainer');
    newsContainer.innerHTML='';
    data.news.forEach(n=>{
      const div=document.createElement('div');
      div.className='news-item';
      div.innerHTML=`<img src='${n.imgURL||"https://via.placeholder.com/80x50"}'/><a href='${n.link}' target='_blank'>${n.title}</a>`;
      newsContainer.appendChild(div);
    });
  }catch(e){console.error(e);}
}
setInterval(loadNews,300000);
loadNews();

// Connect WebSocket
connectWS();
</script>
</body>
</html>
