<!DOCTYPE html>
<html>
<head>

<title>𝗘𝗦 𝗧𝗘𝗔𝗠𝗦 𝗖𝗥𝗬𝗣𝗧𝗢 𝗖𝗢𝗡𝗧𝗥𝗢𝗟 𝗖𝗘𝗡𝗧𝗘𝗥</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
margin:0;
background:#0b1120;
color:white;
transition:0.5s;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:#020617;
box-shadow:0 0 25px rgba(0,0,0,0.8);
}

h1{
font-size:20px;
color:#38bdf8;
}

.status{
display:flex;
align-items:center;
gap:10px;
font-size:14px;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
background:#22c55e;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.2}
100%{opacity:1}
}

.search{
padding:10px;
border-radius:8px;
border:none;
width:220px;
background:#1e293b;
color:white;
}

.toggle-container{
width:50px;
height:28px;
border-radius:50px;
background:#2563eb;
cursor:pointer;
display:flex;
align-items:center;
justify-content:flex-start;
padding:3px;
transition:all 0.5s;
}
.toggle-container.sun{
justify-content:flex-end;
}
.toggle-ball{
width:22px;
height:22px;
border-radius:50%;
background:yellow;
transition:all 0.5s;
}

.container{
padding:25px;
}

.ticker{
overflow:hidden;
white-space:nowrap;
background:#020617;
padding:10px;
margin-bottom:20px;
border-top:1px solid #1e293b;
border-bottom:1px solid #1e293b;
}

.ticker span{
display:inline-block;
padding-right:50px;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
transition:0.3s;
border:1px solid #334155;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 20px #2563eb;
}

.price{
font-size:26px;
margin-top:10px;
}

.green{
color:#22c55e;
}

.red{
color:#ef4444;
}

table{
width:100%;
border-collapse:collapse;
background:#1e293b;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:12px;
text-align:left;
border-bottom:1px solid #334155;
}

.logs{
background:black;
color:#00ff9c;
padding:10px;
height:150px;
overflow:auto;
margin-top:20px;
font-family:monospace;
border-radius:8px;
transition:all 0.5s;
}

.chartbox{
background:#1e293b;
margin-top:25px;
padding:20px;
border-radius:10px;
}

.light{
background:#f1f5f9;
color:black;
}

.light .card{
background:white;
}

.light table{
background:white;
}

.light .logs{
background:#e5e5e5;
color:black;
}
</style>

</head>

<body>

<header>

<h1>𝗘𝗦 𝗧𝗘𝗔𝗠𝗦 𝗖𝗥𝗬𝗣𝗧𝗢 𝗖𝗢𝗡𝗧𝗥𝗢𝗟 𝗖𝗘𝗡𝗧𝗘𝗥</h1>

<div class="status">
<div class="dot"></div>
Monitoring Active
</div>

<div style="display:flex;align-items:center;gap:10px;">
<input class="search" id="search" placeholder="Search altcoin (BTC, ETH, SOL...)">
<div class="toggle-container" id="modeToggle"><div class="toggle-ball"></div></div>
</div>

</header>

<div class="ticker" id="ticker"></div>

<div class="container">

<div class="cards" id="cards"></div>

<h2>Market Table</h2>

<table>
<thead>
<tr>
<th>Coin</th>
<th>Price</th>
<th>24h Change</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div class="chartbox">
<h2>Market Chart</h2>
<canvas id="chart"></canvas>
</div>

<h2>System Logs</h2>
<div class="logs" id="logs"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let logs=[];
let chart;
let isDark=true;
const coins=["bitcoin","ethereum","solana","ripple","toncoin","tether-gold"];
const modeToggle=document.getElementById("modeToggle");

async function loadPrices(){
try{
const res=await fetch("https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids="+coins.join(","));
const data=await res.json();

const cards=document.getElementById("cards");
const table=document.getElementById("table");
const ticker=document.getElementById("ticker");

cards.innerHTML="";
table.innerHTML="";
ticker.innerHTML="";

const prices=[];
const labels=[];

data.forEach(c=>{
const change=c.price_change_percentage_24h;
const color=change>=0?"green":"red";

cards.innerHTML+=`<div class="card"><b>${c.symbol.toUpperCase()}</b><div class="price">$${c.current_price.toLocaleString()}</div><div class="${color}">${change.toFixed(2)}%</div></div>`;
table.innerHTML+=`<tr><td>${c.name}</td><td>$${c.current_price.toLocaleString()}</td><td class="${color}">${change.toFixed(2)}%</td></tr>`;
ticker.innerHTML+=`<span>${c.symbol.toUpperCase()} $${c.current_price.toLocaleString()}</span>`;

prices.push(c.current_price);
labels.push(c.symbol.toUpperCase());

logs.unshift(`[${new Date().toLocaleTimeString()}] ${c.symbol.toUpperCase()} updated`);
if(logs.length>40) logs.pop();
});

document.getElementById("logs").innerHTML=logs.join("<br>");
drawChart(labels,prices);
}catch(e){console.error(e);}
}

function drawChart(labels,prices){
const ctx=document.getElementById("chart");
if(chart) chart.destroy();
chart=new Chart(ctx,{
type:"line",
data:{
labels:labels,
datasets:[{
label:"Market Prices",
data:prices,
borderColor:"#38bdf8",
backgroundColor:"rgba(56,189,248,0.2)",
tension:0.3
}]
},
options:{
plugins:{legend:{display:false}},
scales:{y:{ticks:{color:isDark?"white":"black"}},x:{ticks:{color:isDark?"white":"black"}}}
}
});
}

modeToggle.addEventListener("click",()=>{
document.body.classList.toggle("light");
isDark=!isDark;
modeToggle.classList.toggle("sun");
});

setInterval(loadPrices,5000);
loadPrices();
</script>

</body>
</html>
