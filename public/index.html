<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝗘𝗦 𝗧𝗘𝗔𝗠𝗦 𝗖𝗥𝗬𝗣𝗧𝗢 𝗖𝗘𝗡𝗧𝗘𝗥</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(140deg,#070a13 0%,#131a2c 40%,#0a1121 100%);color:#e6ecff;transition:0.25s;display:flex;flex-direction:row;min-height:100vh;}
.sidebar{width:320px;padding:22px;background:rgba(2,6,23,.96);box-shadow:2px 0 20px rgba(0,0,0,0.8);border-right:1px solid rgba(255,255,255,.12);}
.sidebar h2{color:#81b8f3;margin-top:16px;font-size:19px;letter-spacing:.3px;}
.news{background:rgba(25,35,58,.88);padding:12px;border-radius:10px;margin-top:14px;max-height:300px;overflow-y:auto;border:1px solid rgba(255,255,255,.1);}
.power-btn-container{margin-top:22px;display:flex;justify-content:center;}
.power-btn{width:52px;height:52px;border-radius:50%;background:#d83636;border:none;cursor:pointer;box-shadow:0 0 14px rgba(216,54,54,.8);animation:blink 1.1s infinite;}
@keyframes blink{0%,55%,100%{opacity:1;}25%,80%{opacity:0.3;}}
.container{flex:1;padding:22px;}
header{display:flex;justify-content:space-between;align-items:center;padding:18px;background:rgba(4,7,21,.96);border-radius:10px;box-shadow:0 0 20px rgba(0,0,0,0.65);margin-bottom:18px;}
h1{font-size:24px;color:#8acfff;}
#status{font-size:13px;color:#a5b8d7;margin-left:14px;}
.controls{position:relative;display:flex;gap:10px;align-items:center;}
.search{padding:9px;border-radius:9px;border:1px solid rgba(109,119,138,.5);background:rgba(20,31,52,.95);color:#e7efff;width:220px;outline:none;font-size:13px;transition:0.3s;}
.search:focus{background:rgba(30,46,74,.96);}
.dropdown{position:absolute;top:44px;left:0;width:220px;background:rgba(18,29,50,.98);border-radius:8px;overflow:hidden;max-height:220px;overflow-y:auto;display:none;z-index:99;border:1px solid rgba(255,255,255,.1);}
.dropdown div{padding:9px 10px;cursor:pointer;transition:0.2s;font-size:13px;}
.dropdown div:hover{background:rgba(40,56,95,.95);}
.toggle-container{width:54px;height:30px;border-radius:50px;background:#3c7de6;display:flex;align-items:center;cursor:pointer;padding:4px;transition:all .3s;position:relative;}
.toggle-container.sun{justify-content:flex-end;background:#718096;}
.toggle-ball{width:22px;height:22px;border-radius:50%;background:#ffe566;transition:all .3s;}
.ticker{background:rgba(4,7,21,.95);padding:8px;overflow:hidden;white-space:nowrap;border-bottom:1px solid rgba(124,147,176,.25);border-radius:8px;}
.ticker span{padding-right:48px;display:inline-block;animation:scroll 16s linear infinite;color:#b8d4ff;}
@keyframes scroll{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px;}
.stat,.card{background:rgba(25,36,63,.90);backdrop-filter:blur(6px);padding:14px;border-radius:11px;border:1px solid rgba(125,150,201,.2);transition:0.25s;box-shadow:0 6px 16px rgba(0,0,0,.45);}
.stat:hover,.card:hover{transform:translateY(-4px);box-shadow:0 8px 22px rgba(0,0,0,.6);}
.price{font-size:20px;margin-top:6px;}
.green{color:#10b981;}
.red{color:#f87171;}
table{width:100%;border-collapse:collapse;background:rgba(21,34,58,.9);border-radius:9px;overflow:hidden;transition:0.25s;}
th,td{padding:11px;border-bottom:1px solid rgba(122,150,200,.2);text-align:left;font-size:13px;}
tr:hover{background:rgba(50,73,110,.88);cursor:pointer;}
.chartbox{margin-top:24px;background:rgba(25,35,57,.90);backdrop-filter:blur(6px);padding:20px;border-radius:12px;transition:0.25s;border:1px solid rgba(171,205,236,.15);}
.news-container{display:flex;flex-wrap:wrap;gap:10px;margin-top:25px;}
.news-item{background:rgba(23,34,60,.88);border-radius:8px;overflow:hidden;width:100%;display:flex;align-items:center;gap:10px;padding:10px;transition:0.25s;}
.news-item img{width:80px;height:52px;object-fit:cover;border-radius:6px;}
.news-item a{color:#e0eeff;text-decoration:none;flex:1;font-size:13px;}
.news-item:hover{background:rgba(55,76,118,.9);}
.light{background:#eef1f8;color:#1d2938;}
.light header{background:#ffffff;}
.light table,.light .card,.light .chartbox,.light .stat,.light .news-item{background:#f8fafc;color:#1f2937;}
.light .search{background:#f3f4f6;color:#111827;}
.light .toggle-ball{background:#4b5563;}
.light .ticker{background:#f0f4ff;color:#1f2937;}
.light .card:hover{box-shadow:0px 6px 20px rgba(0,0,0,0.3);}
.light th,.light td{border-bottom:1px solid #dbe4f0;}
@media(max-width:1100px){.sidebar{width:100%;}.cards{grid-template-columns:repeat(auto-fit,minmax(140px,1fr));}.stats{grid-template-columns:repeat(auto-fit,minmax(120px,1fr));}}
@media(max-width:900px){body{flex-direction:column;}.container{padding:16px;}.controls{flex-wrap:wrap;}.search{width:100%;}.dropdown{width:100%;}}
</style>
</head>
<body>
<div class="sidebar">
  <div class="ticker" id="ticker"></div>
  <h2>Market Events</h2>
  <div class="news" id="news"></div>
  <div class="power-btn-container">
    <button class="power-btn" id="powerBtn"></button>
  </div>
</div>
<div class="container">
  <header>
    <h1 id="headerTitle">𝗘𝗦 𝗧𝗘𝗔𝗠𝗦 𝗖𝗥𝗬𝗣𝗧𝗢 𝗖𝗘𝗡𝗧𝗘𝗥</h1>
    <div class="controls">
      <input id="search" class="search" placeholder="Search coin">
      <div class="dropdown" id="dropdown"></div>
      <div class="toggle-container" id="modeToggle"><div class="toggle-ball"></div></div>
    </div>
  </header>
  <div class="stats" id="stats"></div>
  <div class="cards" id="cards"></div>
  <h3>Market Table</h3>
  <table>
    <thead><tr><th>Coin</th><th>Price</th><th>24h</th><th>Market Cap</th></tr></thead>
    <tbody id="table"></tbody>
  </table>
  <div class="chartbox">
    <h3 id="chartTitle">Market Chart</h3>
    <canvas id="chart"></canvas>
  </div>
  <div class="news-container" id="newsContainer"></div>
</div>
<script>
const pairs = [
  "btcusdt","ethusdt","solusdt","trxusdt","tonusdt","dogeusdt","xrpusdt","ltcusdt","xauusdt",
  "adausdt","dotusdt","bnbusdt","shibusdt","maticusdt","avaxusdt","linkusdt","atomusdt","etcusdt","filusdt"
];
let chart, currentCoin="btcusdt", ws, reconnectTimer;
let isDark = true;
const coinData = {};
const statusEl = document.getElementById('status');

function setStatus(text,color='#a5b8d7'){
  statusEl.innerText = text;
  statusEl.style.color = color;
}

function applyTheme(){
  if(isDark){
    document.body.classList.remove('light');
    modeToggle.classList.remove('sun');
  } else {
    document.body.classList.add('light');
    modeToggle.classList.add('sun');
  }
}

const modeToggle = document.getElementById('modeToggle');
modeToggle.addEventListener('click',()=>{
  isDark = !isDark;
  localStorage.setItem('darkMode', isDark);
  applyTheme();
});
if(localStorage.getItem('darkMode')==='false'){isDark=false;} applyTheme();

const powerBtn = document.getElementById('powerBtn');
powerBtn.addEventListener('click',()=>{
  if(window.close){ window.close(); } else { alert('Close action not available.'); }
});

function connectWS(){
  if(ws){
    ws.onopen = ws.onmessage = ws.onclose = ws.onerror = null;
    ws.close();
  }

  const streams = pairs.map(p => p + '@ticker').join('/');
  ws = new WebSocket('wss://stream.binance.com:9443/stream?streams=' + streams);

  ws.onopen = () => {
    setStatus('Connected to Binance', '#34d399');
    if(reconnectTimer){ clearTimeout(reconnectTimer); reconnectTimer = null; }
  };

  ws.onmessage = event => {
    try {
      const msg = JSON.parse(event.data);
      const d = msg.data;
      if(!d || !d.s) return;
      coinData[d.s] = d;
      renderAll();
      if(currentCoin === d.s.toLowerCase()) updateChart(d);
    } catch(e){ console.error('WS message parse failed', e); }
  };

  ws.onerror = error => {
    console.error('WS error', error);
    setStatus('WebSocket error, reconnecting...', '#fbbf24');
  };

  ws.onclose = () => {
    setStatus('Disconnected, reconnecting in 5s...', '#f87171');
    reconnectTimer = setTimeout(connectWS, 5000);
  };
}

function formatNumber(value, decimals=2){
  return Number(value).toLocaleString('en-US',{minimumFractionDigits:0, maximumFractionDigits:decimals});
}

function renderAll(){
  const cardsDiv = document.getElementById('cards');
  const tableBody = document.getElementById('table');
  const tickerDiv = document.getElementById('ticker');
  cardsDiv.innerHTML=''; tableBody.innerHTML=''; tickerDiv.innerHTML='';

  const loaded = pairs.map(p=>coinData[p.toUpperCase()]).filter(Boolean);
  if(!loaded.length){ setStatus('Waiting for live market data...', '#93c5fd'); return; }
  setStatus('Live market data', '#34d399');

  const topGainer = [...loaded].sort((a,b)=>parseFloat(b.P)-parseFloat(a.P))[0];
  const topLoser  = [...loaded].sort((a,b)=>parseFloat(a.P)-parseFloat(b.P))[0];
  const totalVolume = loaded.reduce((sum,co)=>sum + parseFloat(co.q), 0);

  document.getElementById('stats').innerHTML = `
    <div class='stat'><strong>Tracked coins</strong><div class='price'>${loaded.length}</div></div>
    <div class='stat'><strong>24h volume</strong><div class='price'>$${formatNumber(totalVolume/1e9,2)}B</div></div>
    <div class='stat'><strong>Top gainer</strong><div class='price'>${topGainer ? topGainer.s.replace('USDT','')+' '+parseFloat(topGainer.P).toFixed(2)+'%' : 'N/A'}</div></div>
    <div class='stat'><strong>Top loser</strong><div class='price'>${topLoser ? topLoser.s.replace('USDT','')+' '+parseFloat(topLoser.P).toFixed(2)+'%' : 'N/A'}</div></div>
  `;

  loaded.forEach(c=>{
    const change = parseFloat(c.P);
    const color = change >= 0 ? 'green' : 'red';

    cardsDiv.innerHTML += `<div class='card' onclick="setCurrentCoin('${c.s.toLowerCase()}')"><b>${c.s.replace('USDT','')}</b><div class='price'>$${formatNumber(c.c,2)}</div><div class='${color}'>${change.toFixed(2)}%</div></div>`;
    tableBody.innerHTML += `<tr onclick="setCurrentCoin('${c.s.toLowerCase()}')"><td>${c.s.replace('USDT','')}</td><td>$${formatNumber(c.c,2)}</td><td class='${color}'>${change.toFixed(2)}%</td><td>$${formatNumber(parseFloat(c.q)/1e6,2)}M</td></tr>`;
    tickerDiv.innerHTML += `<span>${c.s.replace('USDT','')} $${formatNumber(c.c,2)}</span>`;
  });
}

function setCurrentCoin(coin){
  currentCoin = coin;
  document.getElementById('headerTitle').innerText = coin.replace('usdt','').toUpperCase();
  if(coinData[coin.toUpperCase()]) updateChart(coinData[coin.toUpperCase()]);
}

function updateChart(d){
  const price = parseFloat(d.c);
  const time = new Date().toLocaleTimeString();

  if(!chart){
    const ctx = document.getElementById('chart');
    chart = new Chart(ctx, {
      type: 'line',
      data: { labels: [time], datasets: [{ label: d.s, data:[price], borderColor:'#38bdf8', backgroundColor:'rgba(56,189,248,0.2)', tension:0.3, pointRadius:2 }]},
      options: { plugins:{legend:{display:true}}, scales:{y:{ticks:{color:isDark?'white':'black'}}, x:{ticks:{color:isDark?'white':'black'}}}}
    });
  } else {
    chart.data.labels.push(time);
    chart.data.datasets[0].data.push(price);
    if(chart.data.labels.length > 60){ chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
    chart.data.datasets[0].label = d.s;
    chart.update();
  }
}

const searchInput = document.getElementById('search');
const dropdown = document.getElementById('dropdown');
searchInput.addEventListener('input', ()=>{
  const val = searchInput.value.trim().toLowerCase();
  dropdown.innerHTML='';
  if(!val){ dropdown.style.display='none'; return; }
  pairs.filter(p=>p.includes(val)).forEach(p=>{
    const div = document.createElement('div');
    div.innerText = p.replace('usdt','').toUpperCase();
    div.onclick = ()=>{ setCurrentCoin(p); dropdown.style.display='none'; searchInput.value=''; };
    dropdown.appendChild(div);
  });
  dropdown.style.display = dropdown.children.length ? 'block' : 'none';
});

async function loadNews(){
  try {
    const res = await fetch('https://api.coinstats.app/public/v1/news?skip=0&limit=10');
    const data = await res.json();
    const newsContainer = document.getElementById('newsContainer');
    newsContainer.innerHTML = '';
    (data.news || []).forEach(n => {
      const div = document.createElement('div');
      div.className = 'news-item';
      div.innerHTML = `<img src='${n.imgURL || "https://via.placeholder.com/80x50"}'/><a href='${n.link}' target='_blank' rel='noopener noreferrer'>${n.title}</a>`;
      newsContainer.appendChild(div);
    });
  } catch(e){
    console.error('News load failed', e);
    setStatus('News load failed', '#f87171');
  }
}

setInterval(loadNews, 300000);
loadNews();
connectWS();
</script>
</body>
</html>
